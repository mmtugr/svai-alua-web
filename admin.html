<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alua Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script>
    (function(){
      var t=localStorage.getItem('svai_alua_theme')||'light';
      var r=t==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):t;
      document.documentElement.setAttribute('data-theme',r);
    })();
  </script>
</head>
<body>
  <!-- Auth overlay -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-box">
      <h2>Admin Panel</h2>
      <p data-admin-i18n="auth.subtitle">Devam etmek için giriş yapın</p>
      <form id="auth-form">
        <input type="email" class="form-input" id="auth-email" placeholder="E-posta" autofocus style="margin-bottom:10px">
        <input type="password" class="form-input" id="auth-password" data-admin-i18n-placeholder="auth.placeholder" placeholder="Şifre">
        <p class="auth-error" id="auth-error" data-admin-i18n="auth.error">Yanlış şifre</p>
        <button type="submit" class="admin-btn admin-btn-primary" style="width:100%" data-admin-i18n="auth.login">Giriş</button>
      </form>
      <button type="button" class="admin-btn-link" id="forgot-pass-link" style="margin-top:12px;display:block;width:100%" data-admin-i18n="auth.forgot">Şifremi unuttum</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="admin-layout">
    <header class="admin-header">
      <h1><span>ALUA</span> Admin Panel</h1>
      <div class="admin-header-actions">
        <a href="index.html" class="admin-btn admin-btn-secondary" target="_blank" data-admin-i18n="header.viewSite">Siteyi Görüntüle</a>
        <button class="admin-btn admin-btn-secondary" id="btn-export" data-admin-i18n="header.export">Dışa Aktar</button>
        <button class="admin-btn admin-btn-secondary" id="btn-import" data-admin-i18n="header.import">İçe Aktar</button>
        <button class="admin-btn admin-btn-danger" id="btn-clear" data-admin-i18n="header.clearAll">Tümünü Sıfırla</button>
        <div class="admin-lang-switch">
          <button class="admin-lang-btn" data-admin-lang="ru">RU</button>
          <button class="admin-lang-btn" data-admin-lang="tr">TR</button>
        </div>
        <button class="admin-btn admin-btn-secondary" id="admin-theme-toggle" style="font-size:1.1rem;padding:6px 12px;">☀</button>
        <button class="admin-btn admin-btn-secondary admin-btn-sm" id="btn-change-pass" data-admin-i18n="header.changePass">Şifre Değiştir</button>
        <button class="admin-btn admin-btn-danger admin-btn-sm" id="btn-logout" data-admin-i18n="header.logout">Çıkış</button>
        <input type="file" accept=".json" class="hidden-input" id="import-file">
      </div>
    </header>

    <aside class="admin-sidebar">
      <ul class="admin-sidebar-nav" id="admin-nav"></ul>
    </aside>

    <main class="admin-main">
      <div id="lang-tabs" class="lang-tabs"></div>
      <div id="admin-editor"></div>
    </main>
  </div>

  <!-- Change password modal -->
  <div class="modal-overlay" id="pass-modal" style="display:none">
    <div class="auth-box">
      <h2 data-admin-i18n="pass.title">Şifre Değiştir</h2>
      <form id="pass-form">
        <input type="password" class="form-input" id="pass-current" data-admin-i18n-placeholder="pass.current" placeholder="Mevcut şifre" style="margin-bottom:10px">
        <input type="password" class="form-input" id="pass-new" data-admin-i18n-placeholder="pass.new" placeholder="Yeni şifre" style="margin-bottom:10px">
        <input type="password" class="form-input" id="pass-confirm" data-admin-i18n-placeholder="pass.confirm" placeholder="Yeni şifre (tekrar)" style="margin-bottom:10px">
        <p class="auth-error" id="pass-error"></p>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button type="submit" class="admin-btn admin-btn-primary" style="flex:1" data-admin-i18n="pass.save">Kaydet</button>
          <button type="button" class="admin-btn admin-btn-secondary" style="flex:1" id="pass-cancel" data-admin-i18n="pass.cancel">İptal</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/content.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
